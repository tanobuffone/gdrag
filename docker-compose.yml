# gdrag v2 - Development Infrastructure
# Usage:
#   docker compose up -d                        # PostgreSQL + Qdrant (basic)
#   docker compose --profile graph up -d        # + Memgraph
#   docker compose --profile cache up -d        # + Redis
#   docker compose --profile full up -d         # All services

networks:
  gdrag-network:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  memgraph_data:
  redis_data:

services:
  # ─────────────────────────────────────────────
  # PostgreSQL — sessions, knowledge, agents
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: gdrag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gdrag}
      POSTGRES_USER: ${POSTGRES_USER:-gdrag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gdrag2024}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gdrag} -d ${POSTGRES_DB:-gdrag}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - gdrag-network

  # ─────────────────────────────────────────────
  # Qdrant — vector embeddings
  # ─────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: gdrag-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"       # REST API
      - "${QDRANT_GRPC_PORT:-6334}:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - gdrag-network

  # ─────────────────────────────────────────────
  # Memgraph — knowledge graph (optional)
  # ─────────────────────────────────────────────
  memgraph:
    image: memgraph/memgraph:2.11.0
    container_name: gdrag-memgraph
    restart: unless-stopped
    profiles: ["graph", "full"]
    ports:
      - "${MEMGRAPH_PORT:-7687}:7687"     # Bolt
      - "7444:7444"                        # Monitoring
    volumes:
      - memgraph_data:/var/lib/memgraph
    command: ["--log-level=WARNING", "--memory-limit=1024"]
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole --host localhost --port 7687 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - gdrag-network

  # ─────────────────────────────────────────────
  # Redis — embedding cache (optional)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: gdrag-redis
    restart: unless-stopped
    profiles: ["cache", "full"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gdrag-network

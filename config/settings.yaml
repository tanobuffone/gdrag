# gdrag v2 Configuration
# Environment variables override these settings

app_name: gdrag
version: 2.0.0
debug: false

# API Settings
api_host: "0.0.0.0"
api_port: 8000
api_workers: 4

# Embedding Configuration
embedding:
  provider: local  # local, openai, or both
  local_model: "all-MiniLM-L6-v2"
  openai_model: "text-embedding-3-small"
  dimensions: 384
  batch_size: 32
  cache_embeddings: true

# Chunking Configuration
chunking:
  strategy: hybrid  # sliding_window, semantic, paragraph, hybrid
  chunk_size: 512
  chunk_overlap: 128
  min_chunk_size: 100
  preserve_sentences: true
  semantic_threshold: 0.7

# Re-ranking Configuration
reranking:
  enabled: true
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k_initial: 50
  top_k_final: 10
  batch_size: 32

# Compression Configuration
compression:
  enabled: true
  strategy: hybrid  # summarize, extract, hybrid
  max_summary_tokens: 500
  compression_ratio: 0.3
  preserve_entities: true

# Attention Configuration
attention:
  enabled: true
  decay_factor: 0.95
  recency_weight: 0.3
  relevance_weight: 0.5
  diversity_weight: 0.2
  max_attention_items: 100

# Database Configuration
database:
  # PostgreSQL
  postgres_host: localhost
  postgres_port: 5432
  postgres_db: gdrag
  postgres_user: gdrag
  postgres_password: ""  # Set via POSTGRES_PASSWORD env var

  # Qdrant
  qdrant_host: localhost
  qdrant_port: 6333
  qdrant_collection: gdrag_knowledge

  # Memgraph
  memgraph_host: localhost
  memgraph_port: 7687
  memgraph_user: admin
  memgraph_password: "memgraph2024"  # Set via MEMGRAPH_PASSWORD env var

# Session Configuration
session:
  max_tokens: 8000
  max_history_items: 100
  session_ttl_hours: 24
  auto_compress: true

# Paths
config_dir: config
data_dir: data